<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chill Deserted Island</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud">
      <div id="clock">--:--</div>
      <div id="prompt">click</div>
    </div>
    <button id="start" type="button">
      <span>click to start</span>
      <small>
        chill deserted island · 1h = 24h · ←→↑↓ to look · WASD to move · Space /
        Shift+Space to walk · click the radio
      </small>
    </button>
    <script type="module" src="./index.js"></script>
  </body>
</html>
